<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Find My Gang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/ios.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">Find My Gang</div>
    <div class="nav-links">
      <a href="index.html">Who's around?</a>
      <a href="register.html">My tours</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<header>
  <h1>Find My Gang</h1>
  <p>We're in it together</p>
</header>

<div class="form-stack">
<div class="container">
  <div class="search-box">
    <input type="date" id="date" />
    <button onclick="loadMatches()" class="search-btn">Search</button>
    <button onclick="setToday()" class="today-btn">TODAY</button>
  </div>

  <div class="results" id="results"></div>
  <div class="empty" id="empty"></div>
</div>

<!-- PROFILE MODAL -->
<div id="profileOverlay" class="overlay hidden" onclick="closeProfile(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeProfile()">✕</button>
    <h2 id="profileName"></h2>
    <p id="profilePhone" class="phone"></p>
    <p class="note">You matched on this date and city 🎉</p>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js" defer></script>
<script src="js/index.js" defer></script>

</body>
</html>
