<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Add Tour · Find My Gang</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/ios.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">Find My Gang</div>
    <div class="nav-links">
      <a href="index.html">Who's around?</a>
      <a href="register.html">My tours</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="card">

    <h2>Add a Tour</h2>

    <input id="name" placeholder="Your name">
    <select id="routeCode">
  <option value="">Select tour</option>
</select>
    <input id="startDate" type="date">
    <input id="phone" placeholder="WhatsApp (optional)">

    <button id="submitBtn" class="search-btn" onclick="register()" disabled>
      Loading routes…
    </button>

    <div id="message"></div>

    <hr style="margin:30px 0">

    <h3>Your tours</h3>
    <div id="userTours"></div>

  </div>
</div>

<!-- EDIT TOUR MODAL -->
<div id="editModal" class="overlay hidden" onclick="closeEdit(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeEdit()">✕</button>

    <h2>Edit Tour</h2>

    <input id="editRouteCode" list="routes" placeholder="Tour code" disabled>
    <input id="editStartDate" type="date">

    <button class="search-btn" onclick="saveEdit()">Save</button>
    <button class="today-btn" onclick="closeEdit()">Cancel</button>

    <div id="editMsg"></div>
  </div>
</div>


<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js" defer></script>
<script src="js/register.js" defer></script>



</body>
</html>
