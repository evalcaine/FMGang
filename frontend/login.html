<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Login · Find My Gang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="css/ios.css">
  
</head>

<body>
<header> <h1>Find My Gang</h1></header>

<div class="container">

  <div class="card form-card">

    <h2 id="title" class="title">Sign in</h2>

    <!-- LOGIN -->
    <div id="loginForm">
  <input type="email" id="loginEmail" placeholder="Email" />
  <input type="password" id="loginPassword" placeholder="Password" />
  <button class="search-btn" id="signInBtn">Sign in</button>

  <div class="auth-actions">
    <span class="link subtle" id="forgotBtn">
      Forgot your password?
    </span>
  </div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="hidden">
  <input type="email" id="regEmail" placeholder="Email (any valid email)" />
  <input type="text" id="regName" placeholder="Full name (what others will see)" />
  <div class="phone-group">
  <select id="countryCode">
    <option value="+34" selected>🇪🇸 +34</option>
    <option value="+351">🇵🇹 +351</option>
    <option value="+39">🇮🇹 +39</option>
    <option value="+44">🇬🇧 +44</option>
    <option value="+33">🇫🇷 +33</option>
    <option value="+1">🇺🇸 +1</option>
    <option value="+420">🇨🇿 +420</option>
    <option value="+31">🇳🇱 +31</option>
    <option value="+41">🇨🇭 +41</option>
  </select>

  <input
    type="tel"
    id="regPhone"
    placeholder="Phone number (optional)"
    inputmode="numeric"
  />
</div>
  <input type="password" id="regPassword" placeholder="Password" />
  <button class="search-btn" id="createBtn">Create account</button>
</div>

<div id="message" class="error"></div>

<div class="auth-switch">
  <span class="link strong" id="toggleMode">
    <span id="toggleText">Create account</span>
  </span>
</div>

</div> <!-- card -->


<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script src="js/supabase.js" defer></script>
<script src="js/login.js" defer></script>

</body>
</html>
